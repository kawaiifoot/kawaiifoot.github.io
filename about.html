<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kumbh Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #131313;
            text-align: center;
        }

        .about {
            padding: 50px;
            animation: fadeIn 2s ease-in;
        }

        .about__title {
            font-size: 36px;
            margin-bottom: 20px;
            opacity: 0;
            animation: slideIn 1.5s ease-in forwards;
        }

        .about__text {
            font-size: 18px;
            margin-bottom: 30px;
            color: #f4f4f4;
        }

        .about__container {
            color: #f4f4f4;
        }

        .about__gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .about__img {
            width: 320px;
            height: 180px;
            border-radius: 10px;
            transition: transform 0.3s;
            object-fit: cover;
            cursor: pointer;
        }

        .about__img:hover {
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: black;
        }

        .modal-content {
            display: block;
            max-width: 80%;
            max-height: 80%;
            margin: auto;
            margin-top: 5%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 25px;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"><img src="images/aa.png" class="logo-icon" alt="Medkit Icon">  BIO, TIK, PP , BK</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span> <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Home</a>
                </li>
                <li class="navbar__item">
                    <a href="/about.html" class="navbar__links">About Us</a>
                </li>
                <li class="navbar__item">
                    <a href="/faq.html" class="navbar__links">FAQ</a>
                </li>
                <li class="navbar__item">
                    <a href="/pp.html" class="navbar__links">PP</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="about">
        <div class="about__container">
            <h1 class="about__title">Welcome to My World</h1>
            <p class="about__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent bibendum eros in enim scelerisque, ac sagittis justo hendrerit.</p>
            <div class="about__gallery">
                <img src="images/wmremove-transformed (2).jpeg" class="about__img" alt="Image 1" onclick="openModal(this)">
                <img src="images/image2.jpg" class="about__img" alt="Image 2" onclick="openModal(this)">
                <img src="images/image3.jpg" class="about__img" alt="Image 3" onclick="openModal(this)">
                <img src="images/WhatsApp Image 2025-03-05 at 6.22.06 PM.jpeg" class="about__img" alt="Image 4" onclick="openModal(this)">
            </div>
        </div>
    </div>

    <!-- Modal for enlarged image -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function openModal(img) {
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("modalImage").src = img.src;
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
