<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.14.0/css/all.css"
      integrity="sha384-HzLeBuhoNPvSl5KYnjx0BT+WB0QEEqLprO+NBkkk5gbc67FTaL7XIGa2w1L0Xbgc"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #6e45e2, #88d3ce);
        font-family: 'Kumbh Sans', sans-serif;
      }
      .signup-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 60px);
      }
      .form-box {
        background-color: #131313;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }
      .form-box h2 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #fff;
      }
      .form-box input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      .form-box button {
        width: 100%;
        padding: 12px;
        background-color: #4CAF50;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-top: 15px;
      }
      .form-box button:hover {
        background-color: #45a049;
      }
      .form-box p {
        text-align: center;
        margin-top: 1rem;
        color: #fff;
      }
      .form-box a {
        color: #4CAF50;
        text-decoration: none;
      }

    </style>
  </head>
  <body>
<!-- Navbar Section -->
    <nav class="navbar">
      <div class="navbar__container">
<a href="/" id="navbar__logo"><img src="images/aa.png" class="logo-icon" alt="Medkit Icon">Lorem Ipsum</a>

        <div class="navbar__toggle" id="mobile-menu">
          <span class="bar"></span> <span class="bar"></span>
          <span class="bar"></span>
        </div>
        <ul class="navbar__menu">
          <li class="navbar__item">
            <a href="/" class="navbar__links">Home</a>
          </li>
          <li class="navbar__item">
            <a href="/tech.html" class="navbar__links">Tech</a>
          </li>
          <li class="navbar__item">
            <a href="/faq.html" class="navbar__links">FAQ</a>
          </li>
          <li class="navbar__btn"><a href="/signUp.html" class="button">Sign Up</a></li>
        </ul>
      </div>
    </nav>


    <!-- Sign-Up Form -->
    <div class="signup-container">
      <div class="form-box">
        <h2>Sign Up</h2>
          <form action="/signup" method="post">

          <input type="text" id="username" name="username" placeholder="Username" required />
          <input type="email" id="email" name="email" placeholder="Email" required />
          <input type="password" id="password" name="password" placeholder="Password" required />
          <div id="error-message" style="color: red; margin: 10px 0; display: none;"></div>
          <button type="submit">Sign Up</button>
        </form>
        <script src="app.js"></script>

        <p>Already have an account? <a href="/login.html">Log in</a></p>
      </div>
    </div>
  </body>
</html>
